<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Directory</title>
    <link rel="stylesheet" href="/static/vendor/bootstrap.min.css" />
    <link rel="stylesheet" href="/static/resources/app.css" />
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-4 py-md-5">
      <section class="mb-4">
        <p class="mb-2 small text-uppercase text-secondary fw-semibold">Backend Developer Test</p>
        <h1 class="display-5 fw-bold text-body">Customer Directory</h1>
      </section>

      <section class="card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">
        <div class="d-flex flex-column flex-lg-row gap-4 align-items-lg-end justify-content-lg-between">
          <div>
            <h2 class="h4 mb-1 text-body">Customers</h2>
            <p id="summary" class="mb-0 small text-secondary">Loading data...</p>
          </div>
          <div class="ms-lg-auto search-shell">
            <form id="search-form" class="d-flex flex-wrap gap-3 align-items-end justify-content-end w-100">
              <div class="flex-grow-1 search-field">
                <label class="form-label small text-secondary mb-1" for="search-input">Search</label>
                <input
                  id="search-input"
                  name="search"
                  type="search"
                  placeholder="Name, Email, Company, Gender, Company, City, Title"
                  autocomplete="off"
                  class="form-control"
                />
              </div>
              <div class="flex-shrink-0">
                <button id="search-button" type="submit" class="btn btn-primary">Search</button>
              </div>
            </form>
          </div>
        </div>

        <div id="status" class="small text-warning-emphasis pt-3" aria-live="polite"></div>

        <div class="table-responsive mt-3">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Gender</th>
                <th>Company</th>
                <th>City</th>
                <th>Title</th>
              </tr>
            </thead>
            <tbody id="customer-rows"></tbody>
          </table>
        </div>

        <div class="border-top mt-4 pt-4 d-flex flex-column gap-3 flex-md-row align-items-md-center justify-content-md-between">
          <p id="pagination-summary" class="mb-0 small text-secondary text-nowrap">Page 1 of 1</p>
          <nav id="pagination-nav" class="d-flex justify-content-center w-100" aria-label="Customer list pagination"></nav>
        </div>
        </div>
      </section>
    </main>

    <script src="/static/vendor/jquery.min.js"></script>
    <script src="/static/vendor/pagination.min.js"></script>
    <script src="/static/resources/app.js"></script>
  </body>
</html>
